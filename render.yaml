services:
  - type: web
    name: taxpilot-demo
    runtime: node
    buildCommand: "bun install"
    startCommand: "bun index.ts"
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
